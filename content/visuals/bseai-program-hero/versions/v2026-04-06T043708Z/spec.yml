prompt: >
  Create an editorial illustration for a university degree homepage. Show a
  grounded learner or early-career builder moving through three connected zones:
  historical and research framing, studio or artifact-building work, and public
  proof or deployment. Keep the tone serious, human-scaled, and institutionally
  credible. Avoid sci-fi aesthetics and avoid generic campus-brochure imagery.
negativePrompt: No neon cyberpunk, no floating holograms, no exaggerated
  futuristic cityscape, no stock graduation poses, no readable fake text.
