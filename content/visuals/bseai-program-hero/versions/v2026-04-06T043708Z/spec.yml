caption: The degree should read as a path from historical context and formation
  into visible public capability.
alt: Editorial illustration showing a learner moving from research and
  historical framing into studio work and public proof.
longDescription: The image should suggest a progression from historical and
  institutional framing into present-day studio work. The learner or builder
  appears in a grounded environment with research materials, diagrams, screens,
  and visible work artifacts, ending in a more public-facing proof or deployment
  surface.
