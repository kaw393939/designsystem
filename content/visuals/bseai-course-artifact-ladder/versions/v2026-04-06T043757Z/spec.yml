prompt: >
  Create a reviewable ladder or staircase diagram specification showing eight
  course slots in sequence. Pair each slot with one signature artifact. Make the
  final slot visibly provisional as selected advanced depth rather than a fixed
  course promise. Keep the structure clear enough to translate directly into
  Mermaid, SVG, or another deterministic diagram format.
